spring.application.name=gdut-gxk

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/gdut_kyx?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456

mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

server.port=8080
server.servlet.context-path=/

logging.level.com.gdut.gxk=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.ai=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

spring.ai.dashscope.api-key=${SPRING_AI_DASHSCOPE_API_KEY:}
spring.ai.dashscope.app-id=${SPRING_AI_DASHSCOPE_APP_ID:}

spring.ai.dashscope.chat.enabled=true
spring.ai.dashscope.chat.model=qwen-turbo
spring.ai.dashscope.chat.options.temperature=0.7
spring.ai.dashscope.chat.options.max-tokens=2048
spring.ai.dashscope.chat.options.top-p=0.95
spring.ai.dashscope.chat.options.top-k=50
spring.ai.dashscope.chat.options.seed=1234

spring.ai.chat.memory.expire-seconds=3600
spring.ai.chat.memory.max-messages=20

spring.ai.chat.summary.enabled=true
spring.ai.chat.summary.threshold=15

ai.rate-limit.minute-limit=30
ai.rate-limit.daily-limit=500

ai.cost.threshold.daily=100.0
ai.cost.threshold.max-calls=1000

spring.ai.dashscope.image.enabled=false
spring.ai.dashscope.image.model=wanx-v1

spring.ai.dashscope.audio.enabled=false
spring.ai.dashscope.audio.model=paraformer-realtime-v2

spring.ai.dashscope.embedding.enabled=false
spring.ai.dashscope.embedding.model=text-embedding-v2

spring.ai.redis.store.enabled=true
spring.ai.redis.store.namespace=AI:chat:memory
spring.ai.redis.store.ttl=3600

spring.ai.dashscope.connect-timeout=10000
spring.ai.dashscope.read-timeout=60000
spring.ai.dashscope.write-timeout=30000
spring.ai.dashscope.chat.response-timeout=90000

spring.ai.retry.enabled=true
spring.ai.retry.max-attempts=3
spring.ai.retry.initial-interval=1000
spring.ai.retry.max-interval=10000
spring.ai.retry.multiplier=2.0
spring.ai.retry.retryable-status-codes=429,500,502,503,504

ai.retry.max-attempts=3
ai.retry.initial-interval=1000
ai.retry.multiplier=2.0
ai.retry.max-interval=10000

ai.timeout.connect=5000
ai.timeout.read=60000
ai.timeout.write=10000
ai.timeout.streaming=300000

ai.rate-limit.enabled=true
ai.rate-limit.requests-per-second=10
ai.rate-limit.requests-per-minute=100
ai.rate-limit.requests-per-hour=1000
ai.rate-limit.requests-per-day=10000
ai.rate-limit.strategy=sliding_window
ai.rate-limit.key-prefix=ai:rate-limit:
ai.rate-limit.wait-timeout=5000

ai.chat.max-history-turns=10
ai.chat.max-input-tokens=4096
ai.chat.history-expire-seconds=7200
ai.chat.streaming-enabled=true

ai.enabled=true
ai.history.enabled=true
ai.content-filter.enabled=true
ai.token-stats.enabled=true
ai.fallback.enabled=true
ai.fallback.message=抱歉，AI服务暂时不可用，请稍后再试。